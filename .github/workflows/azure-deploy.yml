name: Build and Deploy to Azure Container App

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_REGISTRY: cinemagicregistryqzcyeyuaun5sa.azurecr.io
  ACR_USERNAME: cinemagicregistryqzcyeyuaun5sa
  RESOURCE_GROUP: cinemagic-rg
  CONTAINER_APP: cinemagic-app

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to Azure Container Registry
        run: |
          az acr login --name ${{ env.ACR_USERNAME }}

      - name: Build and Push Docker Image
        run: |
          IMAGE_TAG=${{ github.sha }}
          REGISTRY_IMAGE=${{ env.AZURE_REGISTRY }}/${{ env.CONTAINER_APP }}:$IMAGE_TAG
          LATEST_IMAGE=${{ env.AZURE_REGISTRY }}/${{ env.CONTAINER_APP }}:latest
          
          # Build image
          docker build -t $REGISTRY_IMAGE -t $LATEST_IMAGE .
          
          # Push image
          docker push $REGISTRY_IMAGE
          docker push $LATEST_IMAGE

      - name: Deploy Image to Azure Container App
        run: |
          az containerapp update \
            --name ${{ env.CONTAINER_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.AZURE_REGISTRY }}/${{ env.CONTAINER_APP }}:${{ github.sha }}
